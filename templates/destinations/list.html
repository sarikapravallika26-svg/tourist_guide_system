{% extends 'base.html' %}
{% block content %}
<h2>Destinations</h2>
<form method="get">
  <input name="q" placeholder="Search" value="{{ q }}">
  <select name="category">
    <option value="">All</option>
    {% for c in categories %}
      <option value="{{ c }}" {% if category == c %}selected{% endif %}>{{ c }}</option>
    {% endfor %}
  </select>
  <button type="submit">Search</button>
</form>
<ul>
  {% for d in destinations %}
    <li>
      <a href="{% url 'destination_detail' pk=d.id %}">{{ d.name }}</a> - {{ d.category }}
    </li>
  {% empty %}
    <li>No destinations yet</li>
  {% endfor %}
</ul>
{% endblock %}
