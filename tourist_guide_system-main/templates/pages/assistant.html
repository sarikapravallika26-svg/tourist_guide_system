{% extends 'base.html' %}
{% load static %}
{% block content %}
  <section class="section page-hero small-hero">
    <div class="container hero-small">
      <span class="eyebrow">Travel Assistant</span>
      <h1>Ask your travel assistant</h1>
      <p>Get quick travel suggestions, destination tips, and planning advice instantly.</p>
    </div>
  </section>

  <section class="section assistant-section">
    <div class="container assistant-grid">
      <div class="assistant-panel glass-card">
        <div class="assistant-header">
          <div>
            <span class="eyebrow">AI Chatbot</span>
            <h2>Travel Assistant</h2>
          </div>
          <div class="assistant-status">Online</div>
        </div>
        <div class="chat-window" id="chatWindow"></div>
        <form id="assistantForm" class="chat-form">
          <input type="text" id="assistantInput" placeholder="Ask about destinations, budgets, or travel tips" autocomplete="off" required />
          <button type="submit" class="btn btn-primary">Send</button>
        </form>
      </div>
      <div class="assistant-suggestions glass-card">
        <h2>Suggested questions</h2>
        <button class="suggestion-btn">Best places in Goa?</button>
        <button class="suggestion-btn">Budget trip to Hyderabad?</button>
        <button class="suggestion-btn">Best season to visit Kashmir?</button>
        <button class="suggestion-btn">Top wildlife safaris in India?</button>
      </div>
    </div>
  </section>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/chatbot.js' %}"></script>
{% endblock %}
