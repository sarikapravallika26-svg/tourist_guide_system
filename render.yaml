services:
  - type: web
    name: smart-tourist
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn smart_tourist.wsgi --log-file -
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: smart-tourist-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"

databases:
  - name: smart-tourist-db
    plan: free
